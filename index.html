<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тимбилдинг зацепок — Терки</title>
<meta name="description" content="Неформальная встреча команды. Боулинг, бильярд, хорошее настроение. Терки, Новосибирск, май 2026.">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://aldtoll.github.io/teambuilding-terki/">
<meta property="og:title" content="Тимбилдинг зацепок — Терки">
<meta property="og:description" content="Неформальная встреча команды. Боулинг, бильярд, хорошее настроение. Терки, Новосибирск, май 2026.">
<meta property="og:image" content="https://aldtoll.github.io/teambuilding-terki/photo1.jpg">
<meta property="og:image:width" content="960">
<meta property="og:image:height" content="720">
<meta property="og:locale" content="ru_RU">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Тимбилдинг зацепок — Терки">
<meta name="twitter:description" content="Неформальная встреча команды. Боулинг, бильярд, хорошее настроение.">
<meta name="twitter:image" content="https://aldtoll.github.io/teambuilding-terki/photo1.jpg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f13;
    color: #e8e8e8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 60px 20px 40px;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f13 100%);
  }

  .badge {
    display: inline-block;
    background: #7c3aed;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 18px;
    color: #9ca3af;
    margin-bottom: 8px;
  }

  .venue {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #6b7280;
    font-size: 14px;
    margin-top: 12px;
  }

  .venue svg { width: 16px; height: 16px; flex-shrink: 0; }

  .section-title {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #6b7280;
    margin: 48px 0 20px;
  }

  /* Gallery */
  .gallery {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
  }

  .photo-card {
    border-radius: 14px;
    overflow: hidden;
    background: #1a1a2e;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  .photo-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(124,58,237,0.25);
  }

  .photo-card img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
  }

  /* Videos */
  .video-grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 14px;
  }

  .video-card {
    border-radius: 14px;
    overflow: hidden;
    background: #1a1a2e;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .video-card video {
    width: 100%;
    display: block;
    aspect-ratio: 9/16;
    object-fit: cover;
    background: #0f0f13;
  }

  .date-strip {
    text-align: center;
    padding: 60px 20px;
    color: #4b5563;
    font-size: 14px;
  }

  .date-strip .dot {
    display: inline-block;
    width: 4px; height: 4px;
    background: #7c3aed;
    border-radius: 50%;
    margin: 0 8px;
    vertical-align: middle;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 12px;
    object-fit: contain;
  }

  .lightbox-close {
    position: fixed;
    top: 20px; right: 24px;
    font-size: 32px;
    color: #fff;
    cursor: pointer;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .lightbox-close:hover { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="badge">Тимбилдинг</div>
  <h1>Зацепки в Терках</h1>
  <p class="subtitle">Неформальная встреча команды</p>
  <div class="venue">
    <svg viewBox="0 0 20 20" fill="none" stroke="#6b7280" stroke-width="1.5">
      <path d="M10 11.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/>
      <path d="M10 2C6.686 2 4 4.686 4 8c0 4.5 6 10 6 10s6-5.5 6-10c0-3.314-2.686-6-6-6z"/>
    </svg>
    Терки, ресто-боулинг — Красный проспект, 2/1, Новосибирск
  </div>
</header>

<p class="section-title">Фото</p>
<div class="gallery">
  <div class="photo-card" onclick="openLightbox('photo1.jpg')">
    <img src="photo1.jpg" alt="Боулинг" loading="lazy">
  </div>
  <div class="photo-card" onclick="openLightbox('photo2.jpg')">
    <img src="photo2.jpg" alt="Боулинг" loading="lazy">
  </div>
  <div class="photo-card" onclick="openLightbox('photo3.jpg')">
    <img src="photo3.jpg" alt="Метро" loading="lazy">
  </div>
  <div class="photo-card" onclick="openLightbox('photo4.jpg')">
    <img src="photo4.jpg" alt="Бильярд" loading="lazy">
  </div>
</div>

<p class="section-title">Видео</p>
<div class="video-grid">
  <div class="video-card"><video src="video1.mp4" controls playsinline preload="metadata"></video></div>
  <div class="video-card"><video src="video2.mp4" controls playsinline preload="metadata"></video></div>
  <div class="video-card"><video src="video3.mp4" controls playsinline preload="metadata"></video></div>
  <div class="video-card"><video src="video4.mp4" controls playsinline preload="metadata"></video></div>
  <div class="video-card"><video src="video5.mp4" controls playsinline preload="metadata"></video></div>
  <div class="video-card"><video src="video6.mp4" controls playsinline preload="metadata"></video></div>
  <div class="video-card"><video src="video7.mp4" controls playsinline preload="metadata"></video></div>
</div>

<div class="date-strip">
  Май 2026 <span class="dot"></span> Новосибирск <span class="dot"></span> Терки
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>

</body>
</html>
